<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Office Energy Monitor - High-Level System Diagram</title>
  <desc id="desc">High-level architecture showing simulated devices, the shared Node backend, persistence, Firebase mirror, web dashboard, Discord bot, and optional LLM providers.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b" />
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#16a34a" />
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0284c7" />
    </marker>
    <style>
      :root { color-scheme: dark; }
      .bg { fill: #0f172a; }
      .core { fill: #0c1f2e; stroke: #38bdf8; stroke-width: 3; }
      .source { fill: #231a0b; stroke: #f59e0b; stroke-width: 3; }
      .client { fill: #0d241a; stroke: #22c55e; stroke-width: 3; }
      .bot { fill: #1a1730; stroke: #818cf8; stroke-width: 3; }
      .external { fill: #1f2937; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; }
      .store { fill: #172033; stroke: #60a5fa; stroke-width: 2.5; }
      .title { fill: #f8fafc; font: 700 30px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #cbd5e1; font: 400 15px "Segoe UI", Arial, sans-serif; }
      .label { fill: #f8fafc; font: 700 18px "Segoe UI", Arial, sans-serif; }
      .small { fill: #cbd5e1; font: 400 13px "Segoe UI", Arial, sans-serif; }
      .tiny { fill: #94a3b8; font: 400 12px "Segoe UI", Arial, sans-serif; }
      .tag { fill: #93c5fd; font: 700 11px "Segoe UI", Arial, sans-serif; letter-spacing: 1.1px; }
      .edge { stroke: #64748b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .edgeGreen { stroke: #16a34a; stroke-width: 2.5; fill: none; marker-end: url(#arrowGreen); }
      .edgeBlue { stroke: #0284c7; stroke-width: 2.5; fill: none; marker-end: url(#arrowBlue); }
      .edgeText { fill: #cbd5e1; font: 600 12px "Segoe UI", Arial, sans-serif; }
      .note { fill: #e0f2fe; font: 700 13px "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720" />
  <text x="42" y="54" class="title">Office Energy Monitor - High-Level System Diagram</text>
  <text x="42" y="82" class="subtitle">One Node.js backend is the source of truth for simulated room devices, live dashboard state, Discord bot answers, alerts, and optional cloud mirroring.</text>

  <rect x="42" y="150" width="260" height="190" rx="18" class="source" />
  <text x="66" y="186" class="tag">SIMULATED DEVICE LAYER</text>
  <text x="66" y="222" class="label">15 Room Devices</text>
  <text x="66" y="250" class="small">3 rooms</text>
  <text x="66" y="272" class="small">2 fans + 3 lights per room</text>
  <text x="66" y="302" class="tiny">Status, watts, room, timestamps</text>
  <text x="66" y="322" class="tiny">Virtual clock drives live changes</text>

  <rect x="404" y="122" width="350" height="250" rx="18" class="core" />
  <text x="430" y="160" class="tag">SHARED BACKEND</text>
  <text x="430" y="196" class="label">Node.js Application</text>
  <text x="430" y="226" class="small">simulation.js: source of truth</text>
  <text x="430" y="250" class="small">Express REST API: state, rooms, usage, alerts</text>
  <text x="430" y="274" class="small">Socket.IO: live state broadcasts</text>
  <text x="430" y="298" class="small">Alert engine: after-hours + long-running devices</text>
  <text x="430" y="328" class="tiny">Started by server/index.js</text>
  <text x="430" y="350" class="note">Dashboard and bot read this same state.</text>

  <rect x="424" y="430" width="310" height="104" rx="16" class="store" />
  <text x="448" y="466" class="tag">LOCAL PERSISTENCE</text>
  <text x="448" y="500" class="label">data/state.json</text>
  <text x="448" y="524" class="small">Survives restarts and stores device state</text>

  <rect x="424" y="582" width="310" height="82" rx="16" class="external" />
  <text x="448" y="616" class="tag">OPTIONAL LLM</text>
  <text x="448" y="646" class="small">Gemini or Groq phrases bot replies</text>

  <rect x="852" y="126" width="276" height="146" rx="18" class="client" />
  <text x="878" y="162" class="tag">USER INTERFACE</text>
  <text x="878" y="198" class="label">Web Dashboard</text>
  <text x="878" y="226" class="small">Browser view served from public/</text>
  <text x="878" y="248" class="small">Room layout, power, usage, alerts</text>

  <rect x="852" y="314" width="276" height="140" rx="18" class="bot" />
  <text x="878" y="350" class="tag">CHAT INTERFACE</text>
  <text x="878" y="386" class="label">Discord Bot</text>
  <text x="878" y="414" class="small">!status, !room</text>
  <text x="878" y="436" class="small">!usage, !alerts, proactive alerts</text>

  <rect x="852" y="524" width="276" height="112" rx="16" class="external" />
  <text x="878" y="560" class="tag">OPTIONAL CLOUD MIRROR</text>
  <text x="878" y="594" class="label">Firebase RTDB</text>
  <text x="878" y="618" class="small">Device status mirror for external consumers</text>

  <path d="M302 244 C344 244 358 244 404 244" class="edge" />
  <text x="322" y="232" class="edgeText">state changes</text>

  <path d="M580 372 L580 430" class="edgeBlue" />
  <text x="596" y="406" class="edgeText">save/load</text>

  <path d="M754 198 C790 198 810 198 852 198" class="edgeGreen" />
  <text x="770" y="184" class="edgeText">Socket.IO live updates</text>
  <path d="M852 234 C812 234 790 250 754 250" class="edgeBlue" />
  <text x="766" y="266" class="edgeText">REST reads</text>

  <path d="M754 318 C796 340 814 364 852 384" class="edge" />
  <text x="764" y="342" class="edgeText">state + alerts</text>
  <path d="M852 420 C812 410 792 384 754 342" class="edgeBlue" />
  <text x="752" y="398" class="edgeText">commands</text>

  <path d="M754 300 C810 388 820 520 852 580" class="edge" />
  <text x="770" y="492" class="edgeText">mirror updates</text>

  <path d="M852 438 C784 502 728 566 734 622" class="edge" />
  <text x="738" y="544" class="edgeText">facts for phrasing</text>
</svg>
