<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Office Energy Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <h1>Office Energy Monitor</h1>
          <p class="subtitle">Live dashboard · shared backend with the Discord bot</p>
        </div>
      </div>
      <div class="clock">
        <div class="time" id="sim-time">--:--</div>
        <div class="badges">
          <span class="badge" id="office-badge">office hours</span>
        </div>
      </div>
      <button
        class="sim-toggle"
        id="sim-toggle"
        type="button"
        aria-label="Pause simulation"
        title="Pause simulation"
      >
        <svg class="ico-pause" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor" />
          <rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor" />
        </svg>
        <svg class="ico-play" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 5v14l11-7z" fill="currentColor" />
        </svg>
        <span class="sim-toggle-label">Pause</span>
      </button>
    </header>

    <main class="grid">
      <!-- Office layout (top view) -->
      <section class="card span-2" id="layout-card">
        <div class="card-head">
          <h2>Office layout — top view</h2>
          <span class="hint">live · updates on its own</span>
        </div>
        <div class="office" id="office"></div>
      </section>

      <!-- Power meter -->
      <section class="card" id="power-card">
        <div class="card-head"><h2>Power consumption</h2></div>
        <div class="power-total">
          <span class="big" id="power-total">0</span><span class="unit">W</span>
        </div>
        <div class="today">Today so far: <strong id="usage-kwh">0</strong> kWh</div>
        <div class="rooms-power" id="rooms-power"></div>
      </section>

      <!-- Alerts -->
      <section class="card" id="alerts-card">
        <div class="card-head"><h2>Active alerts</h2></div>
        <div class="alerts" id="alerts"></div>
      </section>

      <!-- Device status panel -->
      <section class="card span-2" id="devices-card">
        <div class="card-head"><h2>Device status</h2><span class="hint">by room</span></div>
        <div class="devices" id="devices"></div>
      </section>
    </main>

    <!-- Floating Discord invite button (always on top, bottom-right) -->
    <a
      class="discord-fab"
      href="https://discord.gg/fHKfckeSm"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Join our Discord server"
      title="Join our Discord server"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          fill="currentColor"
          d="M20.317 4.369A19.79 19.79 0 0 0 15.885 3c-.196.35-.423.82-.58 1.194a18.27 18.27 0 0 0-5.61 0A12.6 12.6 0 0 0 9.11 3a19.74 19.74 0 0 0-4.435 1.37C1.86 8.59 1.09 12.7 1.475 16.756a19.9 19.9 0 0 0 6.06 3.057c.488-.665.922-1.372 1.296-2.115a12.9 12.9 0 0 1-2.04-.978c.171-.126.34-.257.502-.392a14.2 14.2 0 0 0 12.14 0c.164.14.332.27.502.392-.652.386-1.336.714-2.043.98.375.742.807 1.45 1.296 2.114a19.86 19.86 0 0 0 6.063-3.058c.452-4.7-.772-8.775-3.235-12.386ZM8.02 14.331c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.42 2.157-2.42 1.21 0 2.176 1.096 2.156 2.42 0 1.334-.955 2.419-2.156 2.419Zm7.96 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.42 2.157-2.42 1.21 0 2.176 1.096 2.156 2.42 0 1.334-.946 2.419-2.156 2.419Z"
        />
      </svg>
    </a>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
